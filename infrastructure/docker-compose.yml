services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: postgis_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend_app
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgis
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - ../backend/data:/app/backend/data
      - ../backend:/app/backend

  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
    container_name: qt_frontend
    depends_on:
      postgis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DISPLAY: ${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

    network_mode: "host"

volumes:
  pgdata: