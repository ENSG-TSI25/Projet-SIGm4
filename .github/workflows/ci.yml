name: CI Backend

on:
  push:
    branches: [ main, dev, data-extraction ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build and test
      run: |
        cd backend
        docker build -t backend-test .
        docker run --rm backend-test bash -c "cd /app/build && ctest --output-on-failure"