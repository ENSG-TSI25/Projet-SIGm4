name: Backend CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ ninja-build \
            pkg-config \
            libpqxx-dev libpq-dev \
            libgdal-dev \
            libproj-dev \
            rapidjson-dev
      
      - name: Configure CMake
        working-directory: backend
        run: cmake -B build -G Ninja -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug
      
      - name: Build
        working-directory: backend
        run: cmake --build build --verbose
      
      - name: Run tests
        working-directory: backend
        run: |
          cd build
          ctest --output-on-failure --verbose
      
      - name: Test Summary
        if: always()
        working-directory: backend
        run: |
          cd build
          ctest --output-on-failure || true